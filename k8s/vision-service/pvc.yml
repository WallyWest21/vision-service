apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vision-service-images
  namespace: vision-system
  labels:
    app: vision-service
spec:
  # ReadWriteMany requires a shared-filesystem StorageClass (e.g., NFS, CephFS, Azure Files).
  # Update the storageClassName field below to match your cluster's RWX-capable StorageClass.
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
