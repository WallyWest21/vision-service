apiVersion: v1
kind: Secret
metadata:
  name: vision-service-secret
  namespace: vision-system
  labels:
    app: vision-service
type: Opaque
data:
  # Replace each value with its base64-encoded equivalent, e.g.:
  #   echo -n 'my-api-key' | base64
  Auth__Enabled: BASE64_ENCODED_AUTH_ENABLED
  Auth__ApiKeys: BASE64_ENCODED_API_KEYS
