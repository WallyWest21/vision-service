apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vision-service
  namespace: vision-system
  labels:
    app: vision-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vision-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
