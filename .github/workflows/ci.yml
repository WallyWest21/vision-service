name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

defaults:
  run:
    working-directory: vision-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore VisionService.sln

      - name: Build
        run: dotnet build VisionService.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test VisionService.sln --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: always()
        with:
          filename: '**/coverage.cobertura.xml'
          badge: true
          format: markdown
          output: both

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: vision-service
        run: docker build -f docker/Dockerfile -t vision-service:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 5100:5100 \
            -e YOLO__BaseUrl=http://localhost:7860 \
            -e QWENVL__BaseUrl=http://localhost:8000 \
            vision-service:test
          sleep 5
          curl -f http://localhost:5100/health || exit 1
          docker stop test-container

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Format check
        run: dotnet format VisionService.sln --verify-no-changes --verbosity diagnostic
