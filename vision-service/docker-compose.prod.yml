services:
  vision-service:
    image: vision-service:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5100:5100"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5100
      - Yolo__BaseUrl=http://yolo-api:7860
      - QwenVl__BaseUrl=http://qwen-vl:8000
      - Auth__Enabled=true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      yolo-api:
        condition: service_healthy
      qwen-vl:
        condition: service_healthy

  yolo-api:
    image: yolo-api:latest
    build:
      context: docker/yolo
      dockerfile: Dockerfile.yolo
    ports:
      - "7860:7860"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  qwen-vl:
    image: qwen-vl:latest
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
