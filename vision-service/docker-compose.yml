services:
  vision-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vision-service
    ports:
      - "5100:5100"
    environment:
      - ASPNETCORE_URLS=http://+:5100
      - ASPNETCORE_ENVIRONMENT=Production
      - YOLO__BaseUrl=http://yolo-api:7860
      - YOLO__TimeoutSeconds=30
      - YOLO__MaxRetries=3
      - QWENVL__BaseUrl=http://qwen-vl:8000
      - QWENVL__ModelName=Qwen/Qwen2.5-VL-3B-Instruct
      - QWENVL__MaxTokens=1024
      - QWENVL__Temperature=0.7
      - STORAGE__ImageStoragePath=/data/images
      - STORAGE__RetentionDays=7
      - STORAGE__MaxFileSizeMb=20
      - AUTH__Enabled=false
      - RATELIMIT__RequestsPerMinute=600
    volumes:
      - vision-data:/data/images
    depends_on:
      yolo-api:
        condition: service_healthy
      qwen-vl:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  qwen-vl:
    image: vllm/vllm-openai:latest
    container_name: qwen-vl
    ports:
      - "8001:8000"
    volumes:
      - model-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen2.5-VL-3B-Instruct
      --trust-remote-code
      --max-model-len 4096
      --gpu-memory-utilization 0.85
      --dtype auto
      --enforce-eager
      --max-num-seqs 4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  yolo-api:
    build:
      context: ./docker/yolo
      dockerfile: Dockerfile.yolo
    container_name: yolo-api
    ports:
      - "7861:7860"
    environment:
      - YOLO_MODEL=yolov8n.pt
      - CONFIDENCE_THRESHOLD=0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  vision-data:
  model-cache:
