services:
  vision-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vision-service
    ports:
      - "5100:5100"
    environment:
      - ASPNETCORE_URLS=http://+:5100
      - ASPNETCORE_ENVIRONMENT=Production
      - YOLO__BaseUrl=http://yolo-api:7860
      - YOLO__TimeoutSeconds=30
      - YOLO__MaxRetries=3
      - QWENVL__BaseUrl=http://qwen-vl:8000
      - QWENVL__ModelName=Qwen/Qwen2.5-VL-3B-Instruct
      - QWENVL__MaxTokens=1024
      - QWENVL__Temperature=0.7
      - STORAGE__ImageStoragePath=/data/images
      - STORAGE__RetentionDays=7
      - STORAGE__MaxFileSizeMb=20
      - AUTH__Enabled=false
      - RATELIMIT__RequestsPerMinute=600
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - image-storage:/data/images
    networks:
      - vision-net
    depends_on:
      yolo-api:
        condition: service_healthy
      qwen-vl:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - vision-net
    restart: unless-stopped

  qwen-vl:
    image: ghcr.io/wallywest21/qwen-vl:latest
    container_name: qwen-vl
    ports:
      - "8000:8000"
    networks:
      - vision-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  yolo-api:
    image: ghcr.io/wallywest21/yolo-api:latest
    container_name: yolo-api
    ports:
      - "7860:7860"
    networks:
      - vision-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  vision-net:
    driver: bridge

volumes:
  image-storage:
